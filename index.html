<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAST WAR Server 561 Recruitment | 移民申請</title>
    <meta name="description" content="Migration Application for LAST WAR Survival - Server 561 runH Alliance.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Brawler&family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>

    <header>
        <div class="logo">
            <span class="highlight">S561</span> <span class="alliance">- RUN x HUG</span>
        </div>
        <nav class="lang-switcher" id="lang-switcher">
            <button data-lang="en">EN</button>
            <button data-lang="ja">JA</button>
            <button data-lang="zh">繁中</button>
            <button data-lang="ko">KO</button>
            <button data-lang="th">TH</button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 id="title" class="glitch-text" data-text="SS6-移民申請フォーム">SS6-移民申請フォーム</h1>
            <p id="subtitle">サーバー561 RUN x HUG連盟のエリート部隊に参加しましょう。今すぐ申請を。</p>
        </section>

        <!-- Integrated Dashboard Container -->
        <section class="dashboard-section">
            <div class="dashboard-header-inline">
                <h2 id="modal-title">BATTLE STATUS</h2>
            </div>
            
            <div class="main-stats-inline">
                <div class="total-stats-card">
                    <span class="stat-label" id="lbl-total-apps">TOTAL COMMANDERS</span>
                    <span class="stat-value" id="val-total-apps">--</span>
                </div>
            </div>
            
            <div class="tiers-grid">
                <!-- Gold Tier -->
                <div class="tier-card tier-gold" id="stat-gold">
                    <div class="tier-orb"></div>
                    <div class="tier-label" id="lbl-gold">金色</div>
                    <div class="tier-value"><span id="val-gold">0</span> / 1</div>
                    <div class="tier-progress"><div class="fill"></div></div>
                </div>

                <!-- Purple Tier -->
                <div class="tier-card tier-purple" id="stat-purple">
                    <div class="tier-orb"></div>
                    <div class="tier-label" id="lbl-purple">紫色</div>
                    <div class="tier-value"><span id="val-purple">0</span> / 5</div>
                    <div class="tier-progress"><div class="fill"></div></div>
                </div>

                <!-- Blue Tier -->
                <div class="tier-card tier-blue" id="stat-blue">
                    <div class="tier-orb"></div>
                    <div class="tier-label" id="lbl-blue">藍色</div>
                    <div class="tier-value"><span id="val-blue">0</span> / 50</div>
                    <div class="tier-progress"><div class="fill"></div></div>
                </div>

                <!-- White Tier -->
                <div class="tier-card tier-white" id="stat-white">
                    <div class="tier-orb"></div>
                    <div class="tier-label" id="lbl-white">白色</div>
                    <div class="tier-value"><span id="val-white">0</span> / 80</div>
                    <div class="tier-progress"><div class="fill"></div></div>
                </div>
            </div>

            <div class="dashboard-footer-inline">
                <p id="lbl-footer-intel">REAL-TIME INTEL FROM SECTOR 561</p>
            </div>
        </section>


        <section class="form-container">
            <form id="migrationForm">
                <div class="input-group">
                    <label for="nickname" id="lbl-nickname">Game Nickname *</label>
                    <input type="text" id="nickname" name="nickname" required placeholder="Your in-game name">
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="server" id="lbl-server">Current Server *</label>
                        <input type="number" id="server" name="server" required placeholder="#000">
                    </div>
                    <div class="input-group">
                        <label for="currentAlliance" id="lbl-alliance">Current Alliance *</label>
                        <input type="text" id="currentAlliance" name="currentAlliance" required
                            placeholder="Alliance tag/name">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="heroPower" id="lbl-heroPower">Total Hero Power (M) *</label>
                        <input type="text" id="heroPower" name="heroPower" required placeholder="e.g. 50M">
                    </div>
                    <div class="input-group">
                        <label id="lbl-migrationColor">Migration Color *</label>
                        <div class="color-selector" id="colorSelector">
                            <div class="color-opt" data-color="Gold" style="--c: #ffcc00;"></div>
                            <div class="color-opt" data-color="Purple" style="--c: #c300ff;"></div>
                            <div class="color-opt" data-color="Blue" style="--c: #00f2ff;"></div>
                            <div class="color-opt" data-color="White" style="--c: #ffffff;"></div>
                        </div>
                        <input type="hidden" id="migrationColor" name="migrationColor" value="Gold" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="migrationPoints" id="lbl-migrationPoints">Migration Points *</label>
                        <input type="number" id="migrationPoints" name="migrationPoints" required
                            placeholder="Points required">
                    </div>
                    <div class="input-group">
                        <label for="hqLevel" id="lbl-hqLevel">HQ Level *</label>
                        <input type="number" id="hqLevel" name="hqLevel" required placeholder="30">
                    </div>
                </div>

                <div class="input-group">
                    <label for="remarks" id="lbl-remarks">Remarks / Notes</label>
                    <textarea id="remarks" name="remarks" rows="4"
                        placeholder="Any additional information..."></textarea>
                </div>

                <button type="submit" id="btn-submit">SUBMIT APPLICATION</button>
            </form>
            <div id="statusMessage" class="hidden"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 LAST WAR S561 RUN x HUG Recruitment Portal</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
